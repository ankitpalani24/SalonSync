<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background premium gold/olive gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#708238" />
      <stop offset="100%" stop-color="#2d3516" />
    </linearGradient>
    <!-- Gold text gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b38f20" />
      <stop offset="50%" stop-color="#f1cb5b" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  <!-- Inward thin gold border stroke -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.35" />
  <!-- Center text "SS" using a beautiful serif font stack for premium feel -->
  <text x="50%" y="53%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        fill="url(#goldGrad)" 
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif" 
        font-size="235" 
        font-weight="700" 
        letter-spacing="-12">SS</text>
</svg>